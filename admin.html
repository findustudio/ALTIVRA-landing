<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Altivra — Admin · Waitlist</title>
  <meta name="theme-color" content="#0B1E34" />
  <meta name="color-scheme" content="dark" />
  <meta name="robots" content="noindex, nofollow" />

  <link rel="icon" type="image/png" sizes="32x32" href="photos/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="photos/favicon-16.png" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    :root {
      --midnight:       #0B1E34;
      --midnight-deep:  #06131F;
      --runway:         #142A42;
      --ivory:          #F4F6F9;
      --ivory-dim:      #D8DEE8;
      --mist:           #9AA9BD;
      --muted:          #6B7A90;
      --sky:            #4C9AFF;
      --sky-bright:     #6FB2FF;
      --sky-dim:        #2F80ED;
      --error:          #FF7B7B;
      --success:        #4BE0A0;
      --divider:        rgba(255,255,255,0.08);
      --radius-sm:      12px;
      --radius:         20px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      background: var(--midnight-deep);
      color: var(--ivory);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-weight: 400;
      line-height: 1.62;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }
    body {
      background:
        radial-gradient(ellipse 60% 40% at 90% 95%, rgba(47,128,237,0.06), transparent 65%),
        linear-gradient(180deg, var(--midnight-deep) 0%, #030A12 100%);
    }
    .container { max-width: 1100px; margin: 0 auto; padding: 40px 24px; }
    .mono { font-family: 'JetBrains Mono', monospace; }

    /* ─── HEADER ─── */
    header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 40px; padding-bottom: 24px; border-bottom: 1px solid var(--divider);
    }
    .brand {
      display: flex; align-items: center; gap: 14px;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 500; font-size: 15px; letter-spacing: 0.22em;
      color: var(--ivory); text-decoration: none;
    }
    .brand-mark {
      width: 36px; height: 36px; border-radius: 10px;
      background: #FFFFFF; display: grid; place-items: center;
      overflow: hidden; box-shadow: 0 4px 16px rgba(47,128,237,0.28);
    }
    .brand-mark img { width: 28px; height: 28px; }
    .tag {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--sky-bright); padding: 6px 12px;
      background: rgba(76,154,255,0.1);
      border: 1px solid rgba(76,154,255,0.25); border-radius: 999px;
    }

    /* ─── LOGIN CARD ─── */
    .login-wrap {
      display: flex; justify-content: center; padding-top: 60px;
    }
    .login-card {
      width: 100%; max-width: 420px;
      padding: 38px 36px;
      background: linear-gradient(180deg, rgba(20,38,60,0.5), rgba(20,38,60,0.2));
      border: 1px solid var(--divider); border-radius: var(--radius);
    }
    .login-card h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 24px; font-weight: 500; color: var(--ivory);
      margin-bottom: 8px; letter-spacing: -0.01em;
    }
    .login-card p { color: var(--mist); font-size: 14px; margin-bottom: 28px; }
    .login-card label {
      display: block; color: var(--ivory-dim); font-size: 12px;
      letter-spacing: 0.12em; text-transform: uppercase;
      font-family: 'JetBrains Mono', monospace; margin-bottom: 8px;
    }
    .login-card input[type="password"] {
      width: 100%; padding: 14px 18px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.12); border-radius: 999px;
      color: var(--ivory); font-family: inherit; font-size: 15px;
      outline: none; transition: border-color .2s, background .2s;
    }
    .login-card input[type="password"]:focus {
      border-color: rgba(76,154,255,0.55);
      background: rgba(76,154,255,0.08);
    }
    .btn-primary {
      width: 100%; padding: 13px 22px; margin-top: 18px;
      background: linear-gradient(135deg, var(--sky-bright), var(--sky-dim));
      color: #fff; font-family: inherit; font-weight: 600; font-size: 14px;
      border: none; border-radius: 999px; cursor: pointer;
      transition: transform .15s, box-shadow .25s;
      box-shadow: 0 4px 16px rgba(47,128,237,0.40);
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(47,128,237,0.55); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .login-error {
      margin-top: 14px; padding: 12px 16px;
      background: rgba(255,123,123,0.1); border: 1px solid rgba(255,123,123,0.3);
      border-radius: var(--radius-sm); color: var(--error); font-size: 13px;
      display: none;
    }
    .login-error.visible { display: block; }

    /* ─── DASHBOARD ─── */
    .dashboard { display: none; }
    .dashboard.visible { display: block; }
    .stats {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px; margin-bottom: 36px;
    }
    .stat {
      padding: 22px 24px;
      background: rgba(20,38,60,0.4); border: 1px solid var(--divider);
      border-radius: var(--radius-sm);
    }
    .stat-value {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 32px; font-weight: 500; color: var(--ivory);
      line-height: 1; letter-spacing: -0.02em;
      font-feature-settings: "tnum";
    }
    .stat-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--muted); margin-top: 10px;
    }
    .stat.featured {
      background: linear-gradient(180deg, rgba(76,154,255,0.14), rgba(20,38,60,0.35));
      border-color: rgba(76,154,255,0.45);
    }
    .stat.featured .stat-value { color: var(--sky-bright); }

    .table-head {
      display: flex; justify-content: space-between; align-items: baseline;
      margin-bottom: 16px;
    }
    .table-head h2 {
      font-family: 'Space Grotesk', sans-serif; font-size: 18px; font-weight: 500;
      color: var(--ivory); letter-spacing: -0.01em;
    }
    .table-head .refresh {
      font-family: 'JetBrains Mono', monospace; font-size: 11px;
      color: var(--mist); background: transparent; border: 1px solid var(--divider);
      padding: 6px 14px; border-radius: 999px; cursor: pointer; transition: border-color .2s;
    }
    .table-head .refresh:hover { border-color: var(--sky-bright); color: var(--ivory); }

    .entry-list {
      background: rgba(20,38,60,0.35); border: 1px solid var(--divider);
      border-radius: var(--radius-sm); overflow: hidden;
    }
    .entry {
      display: grid; grid-template-columns: 1fr 120px 180px 100px;
      gap: 16px; padding: 14px 22px;
      border-bottom: 1px solid var(--divider);
      font-size: 14px; align-items: center;
    }
    .entry:last-child { border-bottom: none; }
    .entry .em { color: var(--ivory); font-family: 'JetBrains Mono', monospace; font-size: 13px; }
    .entry .source {
      font-family: 'JetBrains Mono', monospace; font-size: 11px;
      color: var(--sky-bright); text-transform: uppercase; letter-spacing: 0.1em;
    }
    .entry .time { color: var(--mist); font-size: 12px; font-family: 'JetBrains Mono', monospace; }
    .entry .status {
      display: inline-block; padding: 3px 9px; border-radius: 999px;
      font-size: 10px; font-family: 'JetBrains Mono', monospace;
      letter-spacing: 0.08em; text-transform: uppercase;
    }
    .status.sent { background: rgba(75,224,160,0.12); color: var(--success); border: 1px solid rgba(75,224,160,0.3); }
    .status.fail { background: rgba(255,123,123,0.12); color: var(--error); border: 1px solid rgba(255,123,123,0.3); }
    .status.pending { background: rgba(154,169,189,0.12); color: var(--mist); border: 1px solid rgba(154,169,189,0.3); }

    .empty {
      padding: 60px 20px; text-align: center; color: var(--mist);
      font-size: 14px;
    }

    @media (max-width: 720px) {
      .entry { grid-template-columns: 1fr; gap: 4px; padding: 14px 18px; }
      .entry .time, .entry .source, .entry .status { font-size: 11px; }
    }
  </style>
</head>
<body>

<div class="container">

  <header>
    <a href="/" class="brand">
      <span class="brand-mark"><img src="photos/logo-mark.png" alt="" /></span>
      A L T I V R A
    </a>
    <span class="tag">Admin · Waitlist</span>
  </header>

  <!-- ─── LOGIN VIEW ─── -->
  <div id="login-view" class="login-wrap">
    <div class="login-card">
      <h1>Admin access</h1>
      <p>Enter the admin password to view the Altivra waitlist.</p>
      <form id="login-form" novalidate>
        <label for="pw">Password</label>
        <input type="password" id="pw" name="password" autocomplete="current-password" required />
        <button type="submit" class="btn-primary" id="login-btn">Sign in</button>
      </form>
      <div id="login-error" class="login-error"></div>
    </div>
  </div>

  <!-- ─── DASHBOARD VIEW ─── -->
  <div id="dashboard" class="dashboard">

    <div class="stats">
      <div class="stat featured">
        <div class="stat-value" id="stat-count">—</div>
        <div class="stat-label">Founding 500 · Claimed</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="stat-remaining">—</div>
        <div class="stat-label">Seats Remaining</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="stat-recent">—</div>
        <div class="stat-label">Shown below (most recent)</div>
      </div>
    </div>

    <div class="table-head">
      <h2>Recent signups</h2>
      <button class="refresh" id="refresh-btn">↻ Refresh</button>
    </div>

    <div class="entry-list" id="entries">
      <div class="empty">No signups yet.</div>
    </div>

  </div>

</div>

<script type="module">
  import { initializeApp }
    from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
  import { getFunctions, httpsCallable }
    from "https://www.gstatic.com/firebasejs/12.12.0/firebase-functions.js";
  import { initializeAppCheck, ReCaptchaV3Provider }
    from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app-check.js";

  const firebaseConfig = {
    apiKey: "AIzaSyClCmUBwlhOWWi1y3CvsLocxeYryrC12Vo",
    authDomain: "p-ilot-os-16rnx0.firebaseapp.com",
    projectId: "p-ilot-os-16rnx0",
    storageBucket: "p-ilot-os-16rnx0.firebasestorage.app",
    messagingSenderId: "663991355372",
    appId: "1:663991355372:web:cf238bb6c485fae24722c9"
  };

  const app = initializeApp(firebaseConfig);

  // App Check — bot protection for callable functions
  initializeAppCheck(app, {
    provider: new ReCaptchaV3Provider('6LeWmcEsAAAAAKK9WeLHb0rcljjuDcqysq643wCJ'),
    isTokenAutoRefreshEnabled: true
  });

  const functions = getFunctions(app, 'us-central1');
  const adminGetWaitlist = httpsCallable(functions, 'adminGetWaitlist');

  // ─── Elements ───
  const loginView   = document.getElementById('login-view');
  const dashboard   = document.getElementById('dashboard');
  const loginForm   = document.getElementById('login-form');
  const loginBtn    = document.getElementById('login-btn');
  const loginError  = document.getElementById('login-error');
  const pwInput     = document.getElementById('pw');
  const refreshBtn  = document.getElementById('refresh-btn');
  const statCount   = document.getElementById('stat-count');
  const statRem     = document.getElementById('stat-remaining');
  const statRecent  = document.getElementById('stat-recent');
  const entries     = document.getElementById('entries');

  let cachedPassword = '';

  const showError = (msg) => {
    loginError.textContent = msg;
    loginError.classList.add('visible');
  };
  const clearError = () => { loginError.classList.remove('visible'); };

  const escapeHtml = (s) =>
    String(s).replace(/[&<>"']/g, (c) => ({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    })[c]);

  const formatTime = (ms) => {
    if (!ms) return '—';
    const d = new Date(ms);
    const yyyy = d.getFullYear();
    const mm = String(d.getMonth() + 1).padStart(2, '0');
    const dd = String(d.getDate()).padStart(2, '0');
    const hh = String(d.getHours()).padStart(2, '0');
    const min = String(d.getMinutes()).padStart(2, '0');
    return `${yyyy}-${mm}-${dd} ${hh}:${min}`;
  };

  const renderEntries = (items) => {
    if (!items || items.length === 0) {
      entries.innerHTML = '<div class="empty">No signups yet.</div>';
      return;
    }
    entries.innerHTML = items.map((e) => {
      let statusClass = 'pending';
      let statusText = 'Pending';
      if (e.welcomeEmailSentAt) { statusClass = 'sent';  statusText = 'Sent'; }
      if (e.welcomeEmailError)  { statusClass = 'fail';  statusText = 'Failed'; }
      return `
        <div class="entry">
          <div class="em">${escapeHtml(e.email)}</div>
          <div class="source">${escapeHtml(e.source)}</div>
          <div class="time">${formatTime(e.createdAt)}</div>
          <div><span class="status ${statusClass}">${statusText}</span></div>
        </div>
      `;
    }).join('');
  };

  const fetchWaitlist = async () => {
    try {
      const { data } = await adminGetWaitlist({ password: cachedPassword });
      statCount.textContent  = data.count;
      statRem.textContent    = Math.max(0, 500 - data.count);
      statRecent.textContent = data.entries.length;
      renderEntries(data.entries);
      return true;
    } catch (err) {
      console.error(err);
      if (err.code === 'functions/permission-denied') {
        showError('Invalid password.');
      } else {
        showError(err.message || 'Could not load waitlist.');
      }
      return false;
    }
  };

  loginForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    clearError();
    const pw = pwInput.value;
    if (!pw) { showError('Password required.'); return; }

    loginBtn.disabled = true;
    loginBtn.textContent = 'Signing in…';
    cachedPassword = pw;

    const ok = await fetchWaitlist();

    loginBtn.disabled = false;
    loginBtn.textContent = 'Sign in';

    if (ok) {
      loginView.style.display = 'none';
      dashboard.classList.add('visible');
      // Store session password for refresh (sessionStorage clears on tab close)
      try { sessionStorage.setItem('altivra_admin_pw', pw); } catch (_) {}
    } else {
      cachedPassword = '';
    }
  });

  refreshBtn.addEventListener('click', () => {
    fetchWaitlist();
  });

  // Auto-login if we have a cached session password
  try {
    const stored = sessionStorage.getItem('altivra_admin_pw');
    if (stored) {
      cachedPassword = stored;
      pwInput.value = stored;
      fetchWaitlist().then((ok) => {
        if (ok) {
          loginView.style.display = 'none';
          dashboard.classList.add('visible');
        } else {
          sessionStorage.removeItem('altivra_admin_pw');
          cachedPassword = '';
        }
      });
    }
  } catch (_) {}
</script>

</body>
</html>
